            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }

        .post-header {

            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .time { opacity: 0.6; font-size: 0.9rem; }

        .post-actions {
            display: flex;
            gap: 15px;
            opacity: 0.7;

            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;

        .original-text {

            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-style: italic;

        .last-updated {

        // Get relative time
        function getRelativeTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 60) return `${diffMins}分鐘前`;
            if (diffHours < 24) return `${diffHours}小時前`;
            if (diffDays < 7) return `${diffDays}天前`;
            return date.toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric' });
        }

        // Render posts
        function renderPosts(filter = 'all') {
            const container = document.getElementById('postsContainer');
            let filtered = filter === 'all' ? posts : posts.filter(p => p.platform === filter);
            
            // Sort by time (newest first)
            filtered.sort((a, b) => new Date(b.time) - new Date(a.time));
            
            container.innerHTML = filtered.map((post, index) => `
                <div class="post">
                    <div class="post-header">
                        <span class="platform-badge platform-${post.platform}">${post.platform === 'x' ? 'X.com' : 'Threads'}</span>
                        <span class="author">${post.author}</span>
                        <span class="time">${getRelativeTime(post.time)}</span>
                    </div>
                    <div class="post-content" id="content-${index}">${post.contentZh}</div>
                    ${post.content !== post.contentZh ? `
                        <button class="translate-btn" onclick="toggleTranslation(${index})">顯示原文</button>
                        <div class="original-text" id="original-${index}">${post.content}</div>
                    ` : ''}
                    <div class="post-actions">
                        <span>❤️ ${post.likes}</span>
                        <span>💬 ${post.replies}</span>
                        <span>🔁 ${post.reposts}</span>
                    </div>
                </div>
            `).join('');

            // Update stats
            document.getElementById('totalPosts').textContent = posts.length;
            const totalEngagement = posts.reduce((sum, p) => sum + p.likes + p.replies + p.reposts, 0);
            document.getElementById('totalEngagement').textContent = totalEngagement.toLocaleString();
            document.getElementById('lastUpdated').textContent = `最後更新：${new Date().toLocaleString('zh-TW')}`;
        }

        function toggleTranslation(index) {
            const contentEl = document.getElementById(`content-${index}`);
            const originalEl = document.getElementById(`original-${index}`);
            const btn = document.querySelectorAll('.translate-btn')[index];
            
            if (contentEl.style.display === 'none') {
                contentEl.style.display = 'block';
                originalEl.style.display = 'none';
                btn.textContent = '顯示原文';
            } else {
                contentEl.style.display = 'none';
                originalEl.style.display = 'block';
                btn.textContent = '顯示翻譯';
            }
        }

        function filterPosts(platform) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderPosts(platform);
        }
